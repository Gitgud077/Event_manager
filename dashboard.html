<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Event Manager - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
    <h1 class="text-2xl font-bold mb-6">Volunteer Event Manager</h1>
    <p class="text-gray-600">Redirecting to your dashboard...</p>
    <div class="mt-4">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mx-auto"></div>
    </div>
  </div>

  <script type="module">
    import { onAuthStateChange } from './js/auth.js';
    import { handlePostLogin } from './js/role.js';

    // Check auth state and redirect
    onAuthStateChange((user) => {
      if (user) {
        handlePostLogin(user);
      } else {
        // Not logged in, redirect to login
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
