<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Event Manager - Login/Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">Volunteer Event Manager</h1>

    <!-- Login Form -->
    <div id="login-form">
      <h2 class="text-xl font-semibold mb-4">Login</h2>
      <form id="loginForm">
        <div class="mb-4">
          <label for="loginEmail" class="block text-gray-700">Email</label>
          <input type="email" id="loginEmail" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div class="mb-4">
          <label for="loginPassword" class="block text-gray-700">Password</label>
          <input type="password" id="loginPassword" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">Login</button>
      </form>
      <p class="mt-4 text-center">
        Don't have an account? <a href="#" id="showSignup" class="text-blue-500">Sign up</a>
      </p>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" class="hidden">
      <h2 class="text-xl font-semibold mb-4">Sign Up</h2>
      <form id="signupForm">
        <div class="mb-4">
          <label for="signupName" class="block text-gray-700">Name</label>
          <input type="text" id="signupName" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div class="mb-4">
          <label for="signupEmail" class="block text-gray-700">Email</label>
          <input type="email" id="signupEmail" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div class="mb-4">
          <label for="signupPassword" class="block text-gray-700">Password</label>
          <input type="password" id="signupPassword" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div class="mb-4">
          <label for="role" class="block text-gray-700">Role</label>
          <select id="role" class="w-full px-3 py-2 border rounded-lg" required>
            <option value="volunteer">Volunteer</option>
            <option value="eventManager">Event Manager</option>
          </select>
        </div>
        <div class="mb-4" id="volunteerFields" style="display: none;">
          <label for="skills" class="block text-gray-700">Skills (comma-separated)</label>
          <input type="text" id="skills" class="w-full px-3 py-2 border rounded-lg" placeholder="e.g., cooking, driving">
          <label for="availability" class="block text-gray-700 mt-2">Availability (comma-separated)</label>
          <input type="text" id="availability" class="w-full px-3 py-2 border rounded-lg" placeholder="e.g., weekends, evenings">
        </div>
        <button type="submit" class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">Sign Up</button>
      </form>
      <p class="mt-4 text-center">
        Already have an account? <a href="#" id="showLogin" class="text-blue-500">Login</a>
      </p>
    </div>

    <div id="message" class="mt-4 text-center text-red-500"></div>
  </div>

  <script type="module">
    import { login, signup, onAuthStateChange } from './js/auth.js';
    import { handlePostLogin } from './js/role.js';

    // Toggle between login and signup forms
    document.getElementById('showSignup').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('signup-form').classList.remove('hidden');
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('signup-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
    });

    // Show volunteer fields when role is volunteer
    document.getElementById('role').addEventListener('change', (e) => {
      const volunteerFields = document.getElementById('volunteerFields');
      if (e.target.value === 'volunteer') {
        volunteerFields.style.display = 'block';
      } else {
        volunteerFields.style.display = 'none';
      }
    });

    // Handle login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageEl = document.getElementById('message');
      messageEl.textContent = 'Logging in...';
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const result = await login(email, password);
      if (result.success) {
        messageEl.textContent = 'Login successful! Redirecting...';
        handlePostLogin(result.user);
      } else {
        messageEl.textContent = `Login failed: ${result.error}`;
        console.error('Login failed:', result.error);
      }
    });

    // Handle signup form submission
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageEl = document.getElementById('message');
      messageEl.textContent = 'Creating account...';
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const role = document.getElementById('role').value;
      const skills = role === 'volunteer' ? document.getElementById('skills').value.split(',').map(s => s.trim()) : [];
      const availability = role === 'volunteer' ? document.getElementById('availability').value.split(',').map(a => a.trim()) : [];
      const result = await signup(email, password, name, role, skills, availability);
      if (result.success) {
        messageEl.textContent = 'Account created! Redirecting...';
        handlePostLogin(result.user);
      } else {
        messageEl.textContent = `Signup failed: ${result.error}`;
        console.error('Signup failed:', result.error);
      }
    });

    // Check if user is already logged in
    onAuthStateChange((user) => {
      if (user) {
        handlePostLogin(user);
      }
    });
  </script>
</body>
</html>
