<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Manager Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/manager.css">
</head>
<body class="bg-gray-100">
  <header class="header">
    <h1>Event Manager Dashboard</h1>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </header>

  <div class="container">
    <!-- Create Event Form -->
    <div class="card">
      <h2>Create New Event</h2>
      <form id="createEventForm" class="form-grid">
        <div class="form-group">
          <label for="eventTitle">Title</label>
          <input type="text" id="eventTitle" required>
        </div>
        <div class="form-group">
          <label for="requiredSkills">Required Skills (comma-separated)</label>
          <input type="text" id="requiredSkills" required>
        </div>
        <div class="form-group">
          <label for="volunteersNeeded">Volunteers Needed</label>
          <input type="number" id="volunteersNeeded" required>
        </div>
        <div class="form-group">
          <label for="eventTime">Time</label>
          <input type="datetime-local" id="eventTime" required>
        </div>
        <div class="form-group full-width">
          <label for="eventLocation">Location</label>
          <input type="text" id="eventLocation" required>
        </div>
        <div class="form-group full-width">
          <button type="submit" class="submit-btn">Create Event</button>
        </div>
      </form>
    </div>

    <div class="dashboard-grid">
      <!-- Events List -->
      <div class="card events-card">
        <h2>Events</h2>
        <div id="eventsList" class="events-list">
          <!-- Events will be populated here -->
        </div>
      </div>

      <!-- Volunteers List -->
      <div class="card volunteers-card">
        <h2 class="card-title">Volunteers (<span id="volunteerCount">0</span>)</h2>
        <div id="volunteersList" class="volunteers-list">
          <!-- Volunteers will be populated here -->
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="card">
        <h2>Volunteers per Event</h2>
        <canvas id="volunteersPerEventChart"></canvas>
      </div>
      <div class="card">
        <h2>Skill Distribution</h2>
        <canvas id="skillDistributionChart"></canvas>
      </div>
    </div>
  </div>

  <script type="module">
    import { logout, onAuthStateChange } from './js/auth.js';
    import { fetchManagerData, renderManagerDashboard, createEvent, assignVolunteerToEvent, autoAssignVolunteers, getVolunteersForEvent } from './js/app.js';

    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const result = await logout();
      if (result.success) {
        window.location.href = 'index.html';
      } else {
        alert('Logout failed: ' + result.error);
      }
    });

    // Create event form submission
    document.getElementById('createEventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('eventTitle').value;
      const requiredSkills = document.getElementById('requiredSkills').value.split(',').map(s => s.trim());
      const volunteersNeeded = parseInt(document.getElementById('volunteersNeeded').value);
      const time = document.getElementById('eventTime').value;
      const location = document.getElementById('eventLocation').value;
      
      const result = await createEvent({ title, requiredSkills, volunteersNeeded, time, location });
      if (result.success) {
        alert('Event created successfully!');
        // Clear form
        document.getElementById('createEventForm').reset();
        // Reload data
        loadManagerData();
      } else {
        alert('Failed to create event: ' + result.error);
      }
    });

    // Enhanced render function with assignment UI
    async function renderManagerDashboardEnhanced(data) {
      if (!data) return;

      const { events, volunteers } = data;

      // Events list with assignment options
      const eventsList = document.getElementById('eventsList');
      eventsList.innerHTML = '';
      
      for (const event of events) {
        const understaffed = event.assignedVolunteers.length < event.volunteersNeeded;
        const eventDiv = document.createElement('div');
        eventDiv.className = `event-card ${understaffed ? 'understaffed' : 'staffed'}`;
        
        const statusText = understaffed ? '⚠️ UNDERSTAFFED' : '✓ STAFFED';
        
        eventDiv.innerHTML = `
          <div class="event-header">
            <h3 class="event-title">${event.title}</h3>
            <span class="status-badge ${understaffed ? 'understaffed' : 'staffed'}">${statusText}</span>
          </div>
          <p class="event-detail">Location: ${event.location}</p>
          <p class="event-detail">Time: ${new Date(event.time).toLocaleString()}</p>
          <p class="event-detail">Volunteers: <strong>${event.assignedVolunteers.length}/${event.volunteersNeeded}</strong></p>
          <p class="event-detail">Skills: ${event.requiredSkills.join(', ')}</p>
          <div class="event-actions">
            <button class="auto-assign-btn" data-event-id="${event.id}">
              Auto-Assign
            </button>
            <button class="assign-volunteer-btn" data-event-id="${event.id}">
              Assign Volunteer
            </button>
          </div>
        `;
        
        eventsList.appendChild(eventDiv);
      }

      // Update volunteer count
      document.getElementById('volunteerCount').textContent = volunteers.length;

      // Volunteers list
      const volunteersList = document.getElementById('volunteersList');
      volunteersList.innerHTML = '';
      
      volunteers.forEach(volunteer => {
        const div = document.createElement('div');
        div.className = 'volunteer-item';
        div.innerHTML = `
          <p class="volunteer-name">${volunteer.name}</p>
          <p class="volunteer-skills">Skills: ${volunteer.skills.join(', ')}</p>
          <p class="volunteer-reliability">Reliability: ${volunteer.reliabilityScore}/100</p>
        `;
        volunteersList.appendChild(div);
      });

      // Call original render for charts
      renderManagerDashboard(data);
    }

    // Auto-assign button handler
    document.addEventListener('click', async (e) => {
      if (e.target.classList.contains('auto-assign-btn')) {
        const eventId = e.target.dataset.eventId;
        const btn = e.target;
        btn.disabled = true;
        btn.textContent = 'Assigning...';
        
        const result = await autoAssignVolunteers(eventId);
        if (result.success) {
          alert(`Successfully assigned ${result.assignedCount} volunteer(s)!`);
          loadManagerData();
        } else {
          alert('Auto-assign failed: ' + result.error);
          btn.disabled = false;
          btn.textContent = 'Auto-Assign';
        }
      }

      // Assign volunteer button handler
      if (e.target.classList.contains('assign-volunteer-btn')) {
        const eventId = e.target.dataset.eventId;
        const matched = await getVolunteersForEvent(eventId);
        
        if (matched.length === 0) {
          alert('No volunteers with matching skills available!');
          return;
        }

        // Simple modal to select volunteer
        const volunteerList = matched.map((v, idx) => `${idx + 1}. ${v.name} (${v.matchedSkills.join(', ')})`).join('\n');
        const selection = prompt(`Select a volunteer to assign:\n\n${volunteerList}\n\nEnter number (1-${matched.length}):`, '1');
        
        if (selection) {
          const idx = parseInt(selection) - 1;
          if (idx >= 0 && idx < matched.length) {
            const result = await assignVolunteerToEvent(matched[idx].id, eventId);
            if (result.success) {
              alert('Volunteer assigned successfully!');
              loadManagerData();
            } else {
              alert('Assignment failed: ' + result.error);
            }
          } else {
            alert('Invalid selection');
          }
        }
      }
    });

    // Load manager data
    async function loadManagerData() {
      const data = await fetchManagerData();
      renderManagerDashboardEnhanced(data);
    }

    // Check auth and load data
    onAuthStateChange((user) => {
      if (user) {
        loadManagerData();
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
