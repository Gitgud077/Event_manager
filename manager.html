<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Manager Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
  <header class="bg-blue-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Event Manager Dashboard</h1>
    <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded">Logout</button>
  </header>

  <div class="container mx-auto p-4">
    <!-- Create Event Form -->
    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
      <h2 class="text-xl font-semibold mb-4">Create New Event</h2>
      <form id="createEventForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="eventTitle" class="block text-gray-700">Title</label>
          <input type="text" id="eventTitle" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div>
          <label for="requiredSkills" class="block text-gray-700">Required Skills (comma-separated)</label>
          <input type="text" id="requiredSkills" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div>
          <label for="volunteersNeeded" class="block text-gray-700">Volunteers Needed</label>
          <input type="number" id="volunteersNeeded" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div>
          <label for="eventTime" class="block text-gray-700">Time</label>
          <input type="datetime-local" id="eventTime" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div class="md:col-span-2">
          <label for="eventLocation" class="block text-gray-700">Location</label>
          <input type="text" id="eventLocation" class="w-full px-3 py-2 border rounded-lg" required>
        </div>
        <div class="md:col-span-2">
          <button type="submit" class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">Create Event</button>
        </div>
      </form>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
      <!-- Events List -->
      <div class="bg-white p-6 rounded-lg shadow-md lg:col-span-2">
        <h2 class="text-xl font-semibold mb-4">Events</h2>
        <div id="eventsList" class="space-y-4">
          <!-- Events will be populated here -->
        </div>
      </div>

      <!-- Volunteers List -->
      <div class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-xl font-semibold mb-4">Volunteers ({count})</h2>
        <div id="volunteersList" class="space-y-2 max-h-96 overflow-y-auto">
          <!-- Volunteers will be populated here -->
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-xl font-semibold mb-4">Volunteers per Event</h2>
        <canvas id="volunteersPerEventChart"></canvas>
      </div>
      <div class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-xl font-semibold mb-4">Skill Distribution</h2>
        <canvas id="skillDistributionChart"></canvas>
      </div>
    </div>
  </div>

  <script type="module">
    import { logout, onAuthStateChange } from './js/auth.js';
    import { fetchManagerData, renderManagerDashboard, createEvent, assignVolunteerToEvent, autoAssignVolunteers, getVolunteersForEvent } from './js/app.js';

    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const result = await logout();
      if (result.success) {
        window.location.href = 'index.html';
      } else {
        alert('Logout failed: ' + result.error);
      }
    });

    // Create event form submission
    document.getElementById('createEventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('eventTitle').value;
      const requiredSkills = document.getElementById('requiredSkills').value.split(',').map(s => s.trim());
      const volunteersNeeded = parseInt(document.getElementById('volunteersNeeded').value);
      const time = document.getElementById('eventTime').value;
      const location = document.getElementById('eventLocation').value;
      
      const result = await createEvent({ title, requiredSkills, volunteersNeeded, time, location });
      if (result.success) {
        alert('Event created successfully!');
        // Clear form
        document.getElementById('createEventForm').reset();
        // Reload data
        loadManagerData();
      } else {
        alert('Failed to create event: ' + result.error);
      }
    });

    // Enhanced render function with assignment UI
    async function renderManagerDashboardEnhanced(data) {
      if (!data) return;

      const { events, volunteers } = data;

      // Events list with assignment options
      const eventsList = document.getElementById('eventsList');
      eventsList.innerHTML = '';
      
      for (const event of events) {
        const understaffed = event.assignedVolunteers.length < event.volunteersNeeded;
        const eventDiv = document.createElement('div');
        eventDiv.className = `p-4 border rounded ${understaffed ? 'bg-red-50 border-red-300' : 'bg-green-50 border-green-300'}`;
        
        const statusText = understaffed ? '⚠️ UNDERSTAFFED' : '✓ STAFFED';
        
        eventDiv.innerHTML = `
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-semibold text-lg">${event.title}</h3>
            <span class="text-sm font-bold ${understaffed ? 'text-red-600' : 'text-green-600'}">${statusText}</span>
          </div>
          <p class="text-sm text-gray-600">Location: ${event.location}</p>
          <p class="text-sm text-gray-600">Time: ${new Date(event.time).toLocaleString()}</p>
          <p class="text-sm text-gray-600">Volunteers: <strong>${event.assignedVolunteers.length}/${event.volunteersNeeded}</strong></p>
          <p class="text-sm text-gray-600">Skills: ${event.requiredSkills.join(', ')}</p>
          <div class="mt-3 flex flex-wrap gap-2">
            <button class="auto-assign-btn bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600" data-event-id="${event.id}">
              Auto-Assign
            </button>
            <button class="assign-volunteer-btn bg-purple-500 text-white px-3 py-1 rounded text-sm hover:bg-purple-600" data-event-id="${event.id}">
              Assign Volunteer
            </button>
          </div>
        `;
        
        eventsList.appendChild(eventDiv);
      }

      // Volunteers list
      const volunteersList = document.getElementById('volunteersList');
      volunteersList.innerHTML = '';
      const heading = volunteersList.previousElementSibling;
      heading.textContent = `Volunteers (${volunteers.length})`;
      
      volunteers.forEach(volunteer => {
        const div = document.createElement('div');
        div.className = 'p-3 bg-gray-50 rounded border border-gray-200';
        div.innerHTML = `
          <p class="font-semibold text-sm">${volunteer.name}</p>
          <p class="text-xs text-gray-600">Skills: ${volunteer.skills.join(', ')}</p>
          <p class="text-xs text-gray-600">Reliability: ${volunteer.reliabilityScore}/100</p>
        `;
        volunteersList.appendChild(div);
      });

      // Call original render for charts
      renderManagerDashboard(data);
    }

    // Auto-assign button handler
    document.addEventListener('click', async (e) => {
      if (e.target.classList.contains('auto-assign-btn')) {
        const eventId = e.target.dataset.eventId;
        const btn = e.target;
        btn.disabled = true;
        btn.textContent = 'Assigning...';
        
        const result = await autoAssignVolunteers(eventId);
        if (result.success) {
          alert(`Successfully assigned ${result.assignedCount} volunteer(s)!`);
          loadManagerData();
        } else {
          alert('Auto-assign failed: ' + result.error);
          btn.disabled = false;
          btn.textContent = 'Auto-Assign';
        }
      }

      // Assign volunteer button handler
      if (e.target.classList.contains('assign-volunteer-btn')) {
        const eventId = e.target.dataset.eventId;
        const matched = await getVolunteersForEvent(eventId);
        
        if (matched.length === 0) {
          alert('No volunteers with matching skills available!');
          return;
        }

        // Simple modal to select volunteer
        const volunteerList = matched.map((v, idx) => `${idx + 1}. ${v.name} (${v.matchedSkills.join(', ')})`).join('\n');
        const selection = prompt(`Select a volunteer to assign:\n\n${volunteerList}\n\nEnter number (1-${matched.length}):`, '1');
        
        if (selection) {
          const idx = parseInt(selection) - 1;
          if (idx >= 0 && idx < matched.length) {
            const result = await assignVolunteerToEvent(matched[idx].id, eventId);
            if (result.success) {
              alert('Volunteer assigned successfully!');
              loadManagerData();
            } else {
              alert('Assignment failed: ' + result.error);
            }
          } else {
            alert('Invalid selection');
          }
        }
      }
    });

    // Load manager data
    async function loadManagerData() {
      const data = await fetchManagerData();
      renderManagerDashboardEnhanced(data);
    }

    // Check auth and load data
    onAuthStateChange((user) => {
      if (user) {
        loadManagerData();
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
